<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alvin Salazar</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;600;700&family=Quicksand:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --blush:   #F3C6D9;
    --lilac:   #C9B6E0;
    --dusk:    #8E8FC7;
    --plum:    #2E1A38;
    --cream:   #FFF8F2;
    --cream-dim: rgba(255,248,242,0.7);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    overflow: hidden;
  }

  body {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Quicksand', sans-serif;
    color: var(--plum);
    background: linear-gradient(180deg, #C9B6E0 0%, #E3B8CE 45%, #F3C6D9 75%, #FBD9C9 100%);
  }

  /* ── Soft sunset haze blobs ── */
  .haze {
    position: absolute;
    border-radius: 50%;
    filter: blur(60px);
    opacity: 0.55;
    animation: float 16s ease-in-out infinite;
  }
  .haze-1 { width: 420px; height: 420px; background: #F7D8E6; top: -8%; left: -10%; animation-delay: 0s; }
  .haze-2 { width: 360px; height: 360px; background: #B8A6DE; bottom: -12%; right: -8%; animation-delay: -5s; }
  .haze-3 { width: 260px; height: 260px; background: #FCE3C9; bottom: 10%; left: 12%; animation-delay: -9s; opacity: 0.4; }

  @keyframes float {
    0%, 100% { transform: translate(0, 0) scale(1); }
    50%      { transform: translate(20px, -16px) scale(1.05); }
  }

  /* ── Drifting hearts ── */
  .heart {
    position: absolute;
    top: -6%;
    font-size: 14px;
    color: rgba(255,255,255,0.55);
    animation: fall linear infinite;
    user-select: none;
  }
  @keyframes fall {
    0%   { transform: translate(0, 0) rotate(0deg);   opacity: 0; }
    12%  { opacity: 0.8; }
    88%  { opacity: 0.4; }
    100% { transform: translate(30px, 112vh) rotate(200deg); opacity: 0; }
  }

  /* ── Polaroid card ── */
  .polaroid {
    position: relative;
    z-index: 2;
    background: var(--cream);
    padding: 26px 26px 60px;
    width: min(310px, 78vw);
    box-shadow: 0 20px 50px rgba(46,26,56,0.28), 0 4px 12px rgba(46,26,56,0.15);
    transform: rotate(-3deg);
    animation: settle 1.2s cubic-bezier(.2,.9,.3,1) 0.15s both;
  }

  @keyframes settle {
    from { opacity: 0; transform: rotate(-3deg) translateY(24px) scale(0.96); }
    to   { opacity: 1; transform: rotate(-3deg) translateY(0) scale(1); }
  }

  .photo-area {
    aspect-ratio: 1 / 1;
    background:
      radial-gradient(circle at 30% 25%, rgba(255,255,255,0.5), transparent 45%),
      linear-gradient(160deg, #D9C6EA 0%, #EFC3D6 55%, #F8D9C4 100%);
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    padding-bottom: 14px;
  }

  /* subtle silhouette scribble, purely decorative — no copyrighted imagery */
  .scribble-heart {
    position: absolute;
    top: 16px;
    right: 16px;
    width: 26px;
    height: 26px;
    opacity: 0.5;
  }

  .name-cursive {
    font-family: 'Caveat', cursive;
    font-weight: 700;
    font-size: clamp(2.1rem, 8vw, 2.7rem);
    color: var(--plum);
    text-align: center;
    line-height: 1;
  }

  .caption {
    margin-top: 16px;
    text-align: center;
    font-size: 12.5px;
    font-weight: 500;
    color: #6B5A78;
    letter-spacing: 0.2px;
    font-style: italic;
  }

  .tape {
    position: absolute;
    top: -14px;
    left: 50%;
    transform: translateX(-50%) rotate(-2deg);
    width: 74px;
    height: 26px;
    background: rgba(255,255,255,0.55);
    border: 1px solid rgba(255,255,255,0.7);
    box-shadow: 0 3px 6px rgba(46,26,56,0.12);
  }

  .contact-row {
    margin-top: 22px;
    text-align: center;
    font-size: 11.5px;
    color: var(--cream-dim);
    position: relative;
    z-index: 2;
    opacity: 0;
    animation: rise 1s ease-out 0.9s forwards;
  }
  .contact-row a {
    color: var(--plum);
    background: rgba(255,255,255,0.55);
    padding: 3px 10px;
    border-radius: 20px;
    text-decoration: none;
    font-weight: 600;
  }

  @keyframes rise {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .stack {
    position: relative;
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  @media (prefers-reduced-motion: reduce) {
    .haze, .heart { animation: none !important; }
    .polaroid, .contact-row { animation: none !important; opacity: 1 !important; transform: rotate(-3deg) !important; }
  }
</style>
</head>
<body>

  <div class="haze haze-1"></div>
  <div class="haze haze-2"></div>
  <div class="haze haze-3"></div>

  <div class="stack">
    <div class="polaroid">
      <div class="tape"></div>
      <div class="photo-area">
        <svg class="scribble-heart" viewBox="0 0 32 29" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M16 27C16 27 2 18.5 2 9.5C2 4.8 5.6 2 9.4 2C12.3 2 14.7 3.8 16 6.3C17.3 3.8 19.7 2 22.6 2C26.4 2 30 4.8 30 9.5C30 18.5 16 27 16 27Z" stroke="#2E1A38" stroke-width="2" stroke-linejoin="round"/>
        </svg>
        <div class="name-cursive">Alvin Salazar</div>
      </div>
      <div class="caption">pretty, sad, still building something.</div>
    </div>

    <div class="contact-row">
      <a href="mailto:asalazar@usc.edu.ph">asalazar@usc.edu.ph</a>
    </div>
  </div>

  <script>
    const hearts = ['♡','❀','✿'];
    const count = 16;
    for (let i = 0; i < count; i++) {
      const h = document.createElement('div');
      h.className = 'heart';
      h.textContent = hearts[Math.floor(Math.random() * hearts.length)];
      h.style.left = Math.random() * 100 + 'vw';
      h.style.fontSize = (10 + Math.random() * 10) + 'px';
      h.style.animationDuration = (10 + Math.random() * 9) + 's';
      h.style.animationDelay = (Math.random() * 14) + 's';
      document.body.appendChild(h);
    }
  </script>

</body>
</html>
